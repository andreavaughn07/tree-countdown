<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tree Removal Countdown</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2c7a4b, #1e3c2f);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      background: rgba(0,0,0,0.3);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 {
      margin-bottom: 20px;
      font-size: 2em;
    }
    #countdown {
      font-size: 2.5em;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .label {
      margin-top: 15px;
      font-size: 1em;
      opacity: 0.8;
    }
      .message {
    margin-top: 20px;
    font-size: 1.2em;
    opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌳 Tree Removal Countdown</h1>
    <div id="countdown">Loading...</div>
    <div class="label">June 1, 2026 at 8:00 AM</div> 
    <div class="message">Finally getting these trees outta here 😤</div>
  </div>

  <script>
    const targetDate = new Date("June 1, 2026 08:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "🎉 It's Tree Removal Day!";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("countdown").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
